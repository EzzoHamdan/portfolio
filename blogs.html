<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog · Ezzaldeen Hamdan — Thoughts on AI engineering, machine learning, and software development.">
  <meta name="theme-color" content="#09090b">
  <title>Blog | Ezzaldeen Hamdan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="particle-container"></section>

  <header style="visibility: hidden;">
  </header>

  <main>
    <section id="blog-hero">
      <div class="container">
                <a href="index.html" class="blog-back-link">&larr; Back Home</a>

        <h1 class="blog-page-title">Articles & Insights</h1>
        <p class="blog-page-subtitle">Exploring AI engineering, machine learning, and lessons from building production systems.</p>
        
        <div class="blog-filters" id="blog-filters">
          <button class="blog-filter-btn active" data-filter="all">All</button>
          <!-- Filter buttons populated by JS based on available tags -->
        </div>
      </div>
    </section>

    <section id="blog-listing">
      <div class="container">
        <div class="blog-grid" id="blog-grid">
          <!-- Blog cards populated by JS -->
        </div>
        <p class="blog-empty" id="blog-empty" style="display:none;">No articles found for this filter.</p>
      </div>
    </section>
  </main>

  <footer>
    <p><span id="year"></span></p>
  </footer>

  <script src="blog-data.js"></script>
  <script src="blog.js"></script>
  <script src="script.js"></script>
</body>
</html>
