<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09090b">
  <title>Blog Post | Ezzaldeen Hamdan</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main>
    <article id="blog-article">
      <div class="container blog-article-container">
        <a href="../blogs.html" class="blog-back-link">&larr; Back to Blog</a>

        <div class="blog-article-header" id="blog-article-header">
          <!-- Populated by JS: title, meta, tags -->
        </div>

        <div class="blog-article-body" id="blog-article-body">
          <!-- Populated by JS: content -->
        </div>

        <div class="blog-article-footer">
          <div class="blog-share">
            <span class="blog-share-label">Share this article:</span>
            <div class="blog-share-links" id="blog-share-links">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>
      </div>
    </article>
  </main>

  <footer>
    <p><span id="year"></span></p>
  </footer>

  <script src="../blog.js"></script>
  <script src="../script.js"></script>
</body>
</html>
